services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: http://localhost:8080/graphql
    container_name: next_app
    ports:
      - '3000:3000'
    networks:
      - kratos-network
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:8080/graphql
      INTERNAL_GRAPHQL_URL: http://rust_kratos:8080/graphql

networks:
  kratos-network:
    external: true
    name: kratos-network
