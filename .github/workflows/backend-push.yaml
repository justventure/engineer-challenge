name: Build Docker Images (backend)

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"

jobs:
  trigger-build:
    uses: vwency/workflow/.github/workflows/buildx.yaml@main
    with:
      image-name: ${{ github.repository }}/backend
      context: "./backend"
      dockerfile: "./backend/Dockerfile"
    secrets:
      personal_access_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: trigger-build
    steps:
      - name: Deploy to environment
        run: |
          echo "Deploying application"

  trigger-cleanup:
    needs: [trigger-build]
    uses: vwency/workflow/.github/workflows/clean-registry.yaml@main
    with:
      owner: ${{ github.repository_owner }}
      repository: frontend
      package: engineer-challenge/backend
      keep_n_tagged: 2
      dry_run: false
    secrets:
      personal_access_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
