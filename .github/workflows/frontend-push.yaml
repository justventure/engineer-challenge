name: Build Docker Images (Frontend)

on:
  push:
    branches:
      - main
      - master

jobs:
  trigger-build:
    uses: vwency/workflow/.github/workflows/buildx.yaml@main
    with:
      image-name: ${{ github.repository }}/frontend-entrypoint
      context: "./frontend"
      dockerfile: "./frontend/Dockerfile"
      build-args: |
        NEXT_PUBLIC_GRAPHQL_URL=http://localhost:8080/graphql
        NEXT_INTERNAL_GRAPHQL_URL=http://rust_kratos:8080/graphql
    secrets:
      personal_access_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: trigger-build
    steps:
      - name: Deploy to environment
        run: |
          echo "Deploying application"
