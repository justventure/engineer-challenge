name: Build Docker Images (Frontend)

on:
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/**"

jobs:
  trigger-build:
    uses: vwency/workflow/.github/workflows/buildx.yaml@main
    with:
      image-name: ${{ github.repository }}/frontend-entrypoint
      context: "./frontend"
      dockerfile: "./frontend/Dockerfile"
      build-args: |
        NEXT_PUBLIC_GRAPHQL_URL=http://localhost:8080/graphql
        NEXT_INTERNAL_GRAPHQL_URL=http://rust_kratos:8080/graphql
    secrets:
      personal_access_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: trigger-build
    steps:
      - name: Deploy to environment
        run: |
          echo "Deploying application"

  trigger-cleanup:
    needs: [trigger-build]
    uses: vwency/workflow/.github/workflows/clean-registry.yaml@main
    with:
      owner: ${{ github.repository_owner }}
      repository: frontend
      package: engineer-challenge/frontend-entrypoint
      keep_n_tagged: 2
      dry_run: false
    secrets:
      personal_access_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
