serve:
  public:
    port: 4444
    host: 0.0.0.0
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:8080
        - http://127.0.0.1:8080
      allowed_methods:
        - GET
        - POST
      allowed_headers:
        - Authorization
        - Content-Type
        - Cookie
      exposed_headers:
        - Content-Type
      allow_credentials: true
  admin:
    port: 4445
    host: 0.0.0.0
dsn: postgres://hydra:secret@postgres-hydra:5432/hydra?sslmode=disable
urls:
  self:
    issuer: http://localhost:4444
  login: http://host.docker.internal:8080/oauth2/login
  consent: http://host.docker.internal:8080/oauth2/consent
  logout: http://localhost:8080/logout
  error: http://localhost:8080/error
secrets:
  system:
    - youReallyNeedToChangeThis32CharSecret
oidc:
  subject_identifiers:
    supported_types:
      - public
      - pairwise
    pairwise:
      salt: youReallyNeedToChangeThisSalt
oauth2:
  pkce:
    enforced: false
strategies:
  access_token: jwt
  scope: wildcard
ttl:
  access_token: 1h
  refresh_token: 720h
  id_token: 1h
  auth_code: 10m
log:
  level: debug
  format: json
  leak_sensitive_values: true
