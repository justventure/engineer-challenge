name: Build Docker Images (backend)
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "web/backend/rust_kratos/**"

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    outputs:
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

  trigger-build-image:
    needs: [checkout]
    uses: vwency/workflow/.github/workflows/buildx.yaml@main
    with:
      image-name: ${{ github.repository }}/rust-kratos
      context: "./web/backend/rust_kratos"
      dockerfile: "./web/backend/rust_kratos/Dockerfile"
    secrets:
      personal_access_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: trigger-build-image
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Deploy to environment
        run: |
          echo "Deploying application"

  trigger-cleanup:
    needs: [trigger-build-image]
    uses: vwency/workflow/.github/workflows/clean-registry.yaml@main
    with:
      owner: ${{ github.repository_owner }}
      repository: engineer-challenge
      package: engineer-challenge/rust-kratos
      keep_n_tagged: 2
      dry_run: false
    secrets:
      personal_access_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
