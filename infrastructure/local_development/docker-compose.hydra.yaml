networks:
  kratos-network:
    external: true
    name: kratos-network
volumes:
  hydra-db-data:
    name: hydra-db-data
services:
  postgres-hydra:
    image: postgres:17-alpine
    container_name: hydra-postgres
    environment:
      POSTGRES_DB: hydra
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: secret
    volumes:
      - hydra-db-data:/var/lib/postgresql/data
    networks:
      - kratos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 5s
      timeout: 5s
      retries: 10
  hydra-migrate:
    image: oryd/hydra:v2.3.0
    container_name: hydra-migrate
    command: migrate sql --yes postgres://hydra:secret@postgres-hydra:5432/hydra?sslmode=disable
    networks:
      - kratos-network
    depends_on:
      postgres-hydra:
        condition: service_healthy
    restart: on-failure
  hydra:
    image: oryd/hydra:v2.3.0
    container_name: hydra
    command: serve all --dev -c /etc/config/hydra/hydra.yaml
    volumes:
      - ./config/hydra/hydra.yaml:/etc/config/hydra/hydra.yaml:ro
    ports:
      - "4444:4444"
      - "4445:4445"
    networks:
      - kratos-network
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4444/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  hydra-client-init:
    image: oryd/hydra:v2.3.0
    container_name: hydra-client-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        hydra delete client session-manager --endpoint http://hydra:4445 || true
        hydra create client \
          --endpoint http://hydra:4445 \
          --id session-manager \
          --secret my-secret \
          --grant-type authorization_code,refresh_token,client_credentials \
          --response-type code,token \
          --scope openid,profile,email,offline,offline_access \
          --redirect-uri http://localhost:3000/callback \
          --redirect-uri http://localhost:8080/oauth2/callback \
          --redirect-uri http://127.0.0.1:8080/oauth2/callback \
          --token-endpoint-auth-method client_secret_basic
    networks:
      - kratos-network
    depends_on:
      hydra:
        condition: service_healthy
    restart: on-failure
